<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben's 2026 Legacy Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --gold: #fbbf24; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; width: 100%; max-width: 1400px; padding: 15px; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #334155; display: flex; flex-direction: column; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        h2 { margin-top: 0; color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 12px; }
        #countdown { font-size: 1.6rem; font-weight: bold; color: var(--gold); text-align: center; }
        .tv-widget { width: 100%; height: 40px; background: #0f172a; border-bottom: 1px solid #334155; }
        .editable { background: transparent; border: none; color: var(--text); width: 100%; font-size: 0.9rem; outline: none; border-bottom: 1px dotted #475569; margin: 5px 0; }
        .btn-action { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; font-size: 0.8rem; }
        .btn-secondary { background: #334155; color: #fff; text-decoration: none; text-align: center; display: block; padding: 8px; border-radius: 6px; font-size: 0.75rem; margin-top: 10px; }
        #market-status { text-align:center; padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .status-wait { background: #450a0a; color: #fecaca; }
        .status-trade { background: #064e3b; color: #d1fae5; }
        .header { text-align: center; margin: 15px 0; }
        iframe { width: 100%; height: 300px; border: none; border-radius: 8px; background: #fff; }
    </style>
</head>
<body>

    <div class="tv-widget">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            { "symbols": [{ "proName": "NASDAQ:TQQQ", "title": "TQQQ" },{ "proName": "NASDAQ:SQQQ", "title": "SQQQ" },{ "proName": "NASDAQ:NDX", "title": "NAS100" }], "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "en" }
            </script>
        </div>
    </div>

    <div class="header">
        <h1 style="margin:0; font-size: 1.4rem; letter-spacing: 3px;">AYO BENJAMIN CLARKE</h1>
        <p style="color: var(--gold); font-weight: bold; font-size: 0.8rem; margin: 3px 0;">4H LEVELS: 48.50 | 52.00</p>
    </div>

    <div class="grid">
        <div class="card">
            <h2>The Legacy (May 16)</h2>
            <div id="countdown">...</div>
            <div style="height: 150px; background: #334155; border-radius: 8px; overflow: hidden; margin-top: 10px;">
                <img id="keziyah-photo" src="" style="width:100%; height:100%; object-fit:cover;">
            </div>
        </div>

        <div class="card">
            <h2>Revenue Focus</h2>
            <input class="editable" id="t1" placeholder="Task 1">
            <input class="editable" id="t2" placeholder="Task 2">
            <input class="editable" id="t3" placeholder="Task 3">
            <button class="btn-action" onclick="saveData()">LOCK SYSTEM</button>
        </div>

        <div class="card">
            <h2>Today's Schedule</h2>
            <iframe src="https://calendar.google.com/calendar/embed?src=benxino%40gmail.com&mode=AGENDA&showTitle=0&showNav=0&showDate=0&showPrint=0&showTabs=0&showCalendars=0&showTz=0&bgcolor=%23ffffff"></iframe>
        </div>

        <div class="card">
            <h2>Financial Health</h2>
            <div style="font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px;">Weekly Audit:</div>
            <input class="editable" id="networth" placeholder="Net Worth: $0.00">
            <input class="editable" id="cashflow" placeholder="Liquid Cash: $0.00">
            <button class="btn-action" onclick="saveFin()">LOG AUDIT</button>
            <a href="https://simplifi.quicken.com/" target="_blank" class="btn-secondary">OPEN SIMPLIFI</a>
        </div>

        <div class="card">
            <h2>Asset Manager</h2>
            <div id="market-status" class="status-wait" onclick="toggleStatus()">WAIT (NO-MAN'S LAND)</div>
            <p style="font-size: 0.7rem; color: #94a3b8; margin-top: 10px; line-height: 1.4;">
                * System: TQQQ @ 48.50 | SQQQ @ 52.00<br>
                * No level? No trade. Focus on BC Inc.
            </p>
        </div>
    </div>

    <script>
        const targetDate = new Date("May 16, 2026 08:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("countdown").innerHTML = days + " DAYS";
        }
        setInterval(updateCountdown, 1000); updateCountdown();

        function toggleStatus() {
            const box = document.getElementById('market-status');
            if (box.classList.contains('status-wait')) {
                box.classList.remove('status-wait'); box.classList.add('status-trade');
                box.innerText = "AT LEVEL - EXECUTE";
            } else {
                box.classList.remove('status-trade'); box.classList.add('status-wait');
                box.innerText = "WAIT (NO-MAN'S LAND)";
            }
            localStorage.setItem('marketState', box.className);
        }

        function saveData() {
            const tasks = [document.getElementById('t1').value, document.getElementById('t2').value, document.getElementById('t3').value];
            localStorage.setItem('benDashboardTasks', JSON.stringify(tasks));
            alert("Tasks Saved.");
        }

        function saveFin() {
            const fin = [document.getElementById('networth').value, document.getElementById('cashflow').value];
            localStorage.setItem('benFinData', JSON.stringify(fin));
            alert("Financial Audit Logged.");
        }

        window.onload = () => {
            const savedTasks = JSON.parse(localStorage.getItem('benDashboardTasks'));
            if (savedTasks) { document.getElementById('t1').value = savedTasks[0] || ""; document.getElementById('t2').value = savedTasks[1] || ""; document.getElementById('t3').value = savedTasks[2] || ""; }
            
            const savedFin = JSON.parse(localStorage.getItem('benFinData'));
            if (savedFin) { document.getElementById('networth').value = savedFin[0] || ""; document.getElementById('cashflow').value = savedFin[1] || ""; }

            const savedState = localStorage.getItem('marketState');
            if (savedState) {
                const box = document.getElementById('market-status');
                box.className = savedState;
                box.innerText = savedState.includes('wait') ? "WAIT (NO-MAN'S LAND)" : "AT LEVEL - EXECUTE";
            }
            const dayOfWeek = new Date().getDay(); 
            document.getElementById('keziyah-photo').src = `k${dayOfWeek + 1}.jpg`;
        };
    </script>
</body>
</html>
