<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben's 2026 Legacy Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --gold: #fbbf24; --danger: #ef4444; --warning: #eab308; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; width: 100%; max-width: 1400px; padding: 15px; box-sizing: border-box; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #334155; display: flex; flex-direction: column; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        h2 { margin-top: 0; color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 12px; }
        #countdown { font-size: 1.6rem; font-weight: bold; color: var(--gold); text-align: center; }
        .tv-widget { width: 100%; height: 46px; background: #020617; border-bottom: 1px solid #334155; overflow: hidden; }
        .editable { background: transparent; border: none; color: var(--text); width: 100%; font-size: 0.9rem; outline: none; border-bottom: 1px dotted #475569; margin: 5px 0; }
        .btn-action { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; font-size: 0.8rem; }
        .btn-simplifi { background: #334155; color: var(--gold); text-decoration: none; padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; border: 1px solid var(--gold); margin-left: 10px; vertical-align: middle; }
        
        /* Liquidity Guard Styles */
        .bill-item { padding: 10px; border-radius: 8px; margin-bottom: 8px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .bill-green { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--success); color: var(--success); }
        .bill-yellow { background: rgba(234, 179, 8, 0.1); border: 1px solid var(--warning); color: var(--warning); }
        .bill-red { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .status-box { text-align:center; padding: 12px; border-radius: 8px; margin-top: 8px; font-weight: bold; font-size: 0.85rem; cursor: pointer; }
        .status-wait { background: #450a0a; color: #fecaca; }
        .status-level { background: #064e3b; color: #d1fae5; }
        .pos-out { background: #475569; color: #cbd5e1; }
        .pos-in { background: var(--accent); color: #020617; border: 2px solid #fff; }

        .header { text-align: center; margin: 15px 0; }
        .calendar-wrap { width: 100%; height: 250px; border-radius: 8px; overflow: hidden; background: #000; filter: invert(90%) hue-rotate(180deg); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="tv-widget">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            { "symbols": [{ "proName": "NASDAQ:TQQQ", "title": "TQQQ" },{ "proName": "NASDAQ:SQQQ", "title": "SQQQ" },{ "proName": "NASDAQ:NDX", "title": "NAS100" }], "colorTheme": "dark", "backgroundColor": "#020617", "isTransparent": false, "displayMode": "adaptive", "locale": "en" }
            </script>
        </div>
    </div>

    <div class="header">
        <h1 style="margin:0; font-size: 1.4rem; letter-spacing: 3px;">
            AYO BENJAMIN CLARKE 
            <a href="https://simplifi.quicken.com/" target="_blank" class="btn-simplifi">OPEN SIMPLIFI</a>
        </h1>
        <p style="color: var(--gold); font-weight: bold; font-size: 0.8rem; margin: 3px 0;">4H LEVELS: 48.50 | 52.00</p>
    </div>

    <div class="grid">
        <div class="card">
            <h2>The Legacy (May 16)</h2>
            <div id="countdown">...</div>
            <div style="height: 120px; background: #334155; border-radius: 8px; overflow: hidden; margin-top: 10px;">
                <img id="keziyah-photo" src="" style="width:100%; height:100%; object-fit:cover;">
            </div>
        </div>

        <div class="card">
            <h2>Revenue Focus</h2>
            <input class="editable" id="t1" placeholder="Task 1">
            <input class="editable" id="t2" placeholder="Task 2">
            <input class="editable" id="t3" placeholder="Task 3">
            <button class="btn-action" onclick="saveData()">LOCK SYSTEM</button>
        </div>

        <div class="card">
            <h2>Today's Schedule</h2>
            <div class="calendar-wrap">
                <iframe src="https://calendar.google.com/calendar/embed?src=benxino%40gmail.com&mode=AGENDA&showTitle=0&showNav=0&showDate=0&showPrint=0&showTabs=0&showCalendars=0&showTz=0&bgcolor=%23ffffff"></iframe>
            </div>
        </div>

        <div class="card">
            <h2>Liquidity Guard</h2>
            <div id="guard-insurance" class="bill-item">
                <span>Insurance (5th)</span>
                <span id="ins-days">--</span>
            </div>
            <div id="guard-mortgage" class="bill-item">
                <span>Mortgage (12th)</span>
                <span id="mort-days">--</span>
            </div>
            <p style="font-size: 0.65rem; color: #94a3b8; margin-top: 5px; text-align: center;">Yellow = 5 days | Red = 2 days</p>
        </div>

        <div class="card">
            <h2>Asset Manager ($2,500)</h2>
            <div id="market-status" class="status-box status-wait" onclick="toggleMarket()">WAIT (NO-MAN'S LAND)</div>
            <div id="position-status" class="status-box pos-out" onclick="togglePosition()">OUT OF TRADE</div>
        </div>
    </div>

    <script>
        // COUNTDOWN
        const targetDate = new Date("May 16, 2026 08:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("countdown").innerHTML = days + " DAYS";
        }
        setInterval(updateCountdown, 1000);

        // LIQUIDITY GUARD LOGIC
        function updateLiquidityGuard() {
            const now = new Date();
            const today = now.getDate();
            const month = now.getMonth();
            const year = now.getFullYear();

            function getDaysUntil(targetDay) {
                let targetDate = new Date(year, month, targetDay);
                if (today > targetDay) targetDate = new Date(year, month + 1, targetDay);
                return Math.ceil((targetDate - now) / (1000 * 60 * 60 * 24));
            }

            function styleGuard(elementId, daysId, targetDay, label) {
                const days = getDaysUntil(targetDay);
                const el = document.getElementById(elementId);
                const txt = document.getElementById(daysId);
                txt.innerText = days + "d";
                
                el.className = "bill-item " + (days <= 2 ? "bill-red" : days <= 5 ? "bill-yellow" : "bill-green");
            }

            styleGuard('guard-insurance', 'ins-days', 5, "Insurance");
            styleGuard('guard-mortgage', 'mort-days', 12, "Mortgage");
        }

        function toggleMarket() {
            const box = document.getElementById('market-status');
            if (box.classList.contains('status-wait')) { box.className = 'status-box status-level'; box.innerText = "AT LEVEL - READY"; }
            else { box.className = 'status-box status-wait'; box.innerText = "WAIT (NO-MAN'S LAND)"; }
            localStorage.setItem('marketState', box.className);
        }

        function togglePosition() {
            const box = document.getElementById('position-status');
            if (box.classList.contains('pos-out')) { box.className = 'status-box pos-in'; box.innerText = "IN TRADE (EXPOSED)"; }
            else { box.className = 'status-box pos-out'; box.innerText = "OUT OF TRADE"; }
            localStorage.setItem('positionState', box.className);
        }

        function saveData() {
            const tasks = [document.getElementById('t1').value, document.getElementById('t2').value, document.getElementById('t3').value];
            localStorage.setItem('benDashboardTasks', JSON.stringify(tasks));
            alert("Tasks Saved.");
        }

        window.onload = () => {
            const savedTasks = JSON.parse(localStorage.getItem('benDashboardTasks'));
            if (savedTasks) { document.getElementById('t1').value = savedTasks[0] || ""; document.getElementById('t2').value = savedTasks[1] || ""; document.getElementById('t3').value = savedTasks[2] || ""; }
            
            const savedMarket = localStorage.getItem('marketState');
            if (savedMarket) { 
                const box = document.getElementById('market-status');
                box.className = savedMarket;
                box.innerText = savedMarket.includes('wait') ? "WAIT (NO-MAN'S LAND)" : "AT LEVEL - READY";
            }

            const savedPosition = localStorage.getItem('positionState');
            if (savedPosition) {
                const box = document.getElementById('position-status');
                box.className = savedPosition;
                box.innerText = savedPosition.includes('pos-out') ? "OUT OF TRADE" : "IN TRADE (EXPOSED)";
            }

            updateLiquidityGuard();
            updateCountdown();
            const dayOfWeek = new Date().getDay(); 
            document.getElementById('keziyah-photo').src = `k${dayOfWeek + 1}.jpg`;
        };
    </script>
</body>
</html>
